name: Build and upload

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross --rev 19bc73f2775a0683a991910a21c6368aaaa858f8
    - name: Build
      run: cross build --target aarch64-unknown-linux-gnu --verbose --release
    - name: Debug
      run: find target/
    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
          name: dutlib-${{ github.sha }}
          path: |
            target/release/rb3gen2-remote
            target/release/rb3gen2-test
