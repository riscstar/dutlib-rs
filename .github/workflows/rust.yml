name: Build and upload

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Ensure `git describe` works in later steps
          fetch-depth: 0
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 19bc73f2775a0683a991910a21c6368aaaa858f8
      - name: Build AArch64
        run: cross build --target aarch64-unknown-linux-gnu --release
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build native
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p dutlib-$(git describe)/aarch64
          mkdir -p dutlib-$(git describe)/x86_64
          cp README.md dutlib-*/
          cp target/aarch64-unknown-linux-gnu/release/rb3gen2-remote dutlib-*/aarch64/
          cp target/aarch64-unknown-linux-gnu/release/rb3gen2-test dutlib-*/aarch64/
          cp target/release/rb3gen2-remote dutlib-*/x86_64/
          cp target/release/rb3gen2-test dutlib-*/x86_64/
          tar --owner 0 --group 0 -cf dutlib-$(git describe).tar dutlib-*/
          zstd --ultra -20 dutlib-*.tar
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dutlib
          path: |
            dutlib-*.tar.zst
